---
# If true, the FSM transitions are managed by an external tool
Managed: false
# If true and the FSM is self-managed, transitions should be triggered
StepByStep: true
# Change idle behaviour, if true the state is kept until transition,
# otherwise the FSM holds the last state until transition
IdleKeepState: true
# Where to look for state libraries
StatesLibraries:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
# Where to look for state files
StatesFiles:
- "@MC_STATES_DEFAULT_RUNTIME_INSTALL_PREFIX@/data"
- "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"
# If true, state factory will be more verbose
VerboseStateFactory: false
# Additional robots to load
robots:
  panda_femur_original:
    module: Panda2LIRMM_FR1_Mukca_Table2
  panda_tibia_original:
    module: Panda7LIRMM_FR1_Mukca_Table2
  panda_tibia:
    module: Panda7LIRMM_FR1_Mukca_Table2_Calibrated
  ground:
    module: env/ground
# General constraints, always on
constraints:
- type: contact
- type: kinematics
  damper: [0.1, 0.01, 0.5]
- type: compoundJoint
# Collision constraint
collisions:
- type: collision
  useMinimal: false
contacts: []

# Implement some additional text states
states: {}
# Transitions map
transitions:
- [KinematicsCalibrationController_Initial, OK, KinematicsCalibrationController_Initial, Strict]
# Initial state
init: KinematicsCalibrationController_Initial

ObserverPipelines:
 - name: EncoderObserver 
   observers:
   - type: Encoder
     name: panda_femur_calibrated_encoder
     robot: panda_femur
     position: encoderValues
     velocity: encoderVelocities
   - type: Encoder
     name: panda_femur_original_encoder
     robot: panda_femur
     updateRobot: panda_femur_original
     position: encoderValues
     velocity: encoderVelocities
   - type: Encoder
     name: panda_tibia_calibrated_encoder
     robot: panda_tibia
     position: encoderValues
     velocity: encoderVelocities
   - type: Encoder
     name: panda_tibia_original_encoder
     robot: panda_tibia
     updateRobot: panda_tibia_original
     position: encoderValues
     velocity: encoderVelocities

