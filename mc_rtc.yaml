MainRobot:
  name: panda_femur
  module: Panda2LIRMM_FR1_Mukca_Table2_Calibrated

Enabled: KinematicsCalibrationController
Timestep: 0.001

ControllerModulePaths: ["/home/arnaud/devel/mc-rtc-nix/install/lib64/mc_controller"]
RobotModulePaths: ["/home/arnaud/devel/mc-rtc-nix/install/lib64/mc_robots"]
ObserverModulePaths: ["/home/arnaud/devel/mc-rtc-nix/install/lib64/mc_observers"]
GlobalPluginPaths: ["/home/arnaud/devel/mc-rtc-nix/install/lib64/mc_plugins"]

# Franka specific configuration
Franka:
  ShowNetworkWarnings: true # If true (default), show warning messages about missing network data
  ControlMode: Observed # Can be: Position/Velocity/Torque
  #ControlMode: Position # Can be: Position/Velocity/Torque
  panda_femur: # Robot on which the femur (positive knee) is attached
    ip: panda2 # IP of the robot
  panda_tibia: # Robot on which the tibia is attached
    ip: panda7
  # Actuated robots that are not controlled via mc_franka
  ignored: [env/door, env/box]
